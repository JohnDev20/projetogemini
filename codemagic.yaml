workflows:
  android-workflow:
    name: Android Release Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - keystore_credentials # Configure no painel do Codemagic se for assinar o APK
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
    scripts:
      - name: Instalar dependências do Flutter
        script: |
          flutter packages pub get
      - name: Executar gerador de código Isar
        script: |
          dart run build_runner build --delete-conflicting-outputs
      - name: Executar testes de unidade
        script: |
          flutter test
      - name: Compilar APK de Produção
        script: |
          flutter build apk --release
      - name: Compilar App Bundle (AAB) para Google Play
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab

  ios-workflow:
    name: iOS Release Build
    max_build_duration: 40
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns: main
    scripts:
      - name: Instalar dependências do Flutter
        script: |
          flutter packages pub get
      - name: Executar gerador de código Isar
        script: |
          dart run build_runner build --delete-conflicting-outputs
      - name: Instalar Pods e configurar iOS
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Compilar iOS IPA
        script: |
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
