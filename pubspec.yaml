name: lista_facil
description: "Aplicativo profissional de lista de compras simples e rápido."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Gerenciamento de Estado e Injeção de Dependências
  flutter_bloc: ^8.1.3
  get_it: ^7.6.0

  # Banco de Dados Local (Isar)
  isar: ^4.0.0
  isar_flutter_libs: ^4.0.0
  path_provider: ^2.1.1

  # Interface e Utilitários
  google_fonts: ^6.1.0
  intl: ^0.19.0
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Geradores de Código para Isar
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
